<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIQ the 13th 採点システム - 問題一覧</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: sans-serif;
            background: #1a1a2e;
            color: white;
            min-height: 100vh;
            padding: 20px;
        }

        .top-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 20px;
        }

        .scorer-badge {
            margin-left: auto;
            background: #0f3460;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 13px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            background: #4caf50;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }

        .btn:hover {
            background: #388e3c;
        }

        .legend {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #aaa;
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }

        .q-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .q-card {
            background: #16213e;
            border-radius: 10px;
            padding: 10px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
            min-height: 90px;
        }

        .q-card:hover {
            border-color: #4caf50;
        }

        .q-card.locked {
            cursor: not-allowed;
            opacity: 0.6;
        }

        .q-card.locked:hover {
            border-color: transparent;
        }

        .q-card.mine {
            border-color: #2196f3;
        }

        .q-card.done {
            background: #1b3a1f;
        }

        .q-card.conflict {
            background: #3a1b00;
            border-color: #ff9800;
        }

        .q-card.confirmed {
            background: #1a237e;
        }

        .q-num {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 6px;
        }

        .q-scorers {
            font-size: 10px;
            color: #aaa;
            line-height: 1.6;
        }

        .q-status {
            font-size: 10px;
            margin-top: 4px;
            padding: 2px 6px;
            border-radius: 4px;
            display: inline-block;
        }

        .status-open {
            background: #333;
            color: #aaa;
        }

        .status-inprogress {
            background: #0d47a1;
            color: #90caf9;
        }

        .status-done {
            background: #1b5e20;
            color: #a5d6a7;
        }

        .status-conflict {
            background: #e65100;
            color: #ffcc80;
        }

        .status-confirmed {
            background: #1a237e;
            color: #90caf9;
        }

        .status-locked {
            background: #333;
            color: #666;
        }
    </style>
</head>

<body>
    <div class="top-bar">
        <h1>問題一覧</h1>
        <div class="scorer-badge" id="scorer-badge"></div>
        <button class="btn" id="admin-btn" style="display:none" onclick="location.href='admin.html'">管理者画面</button>
    </div>

    <div class="legend">
        <div class="legend-item">
            <div class="legend-dot" style="background:#16213e;border:1px solid #444"></div>未着手
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background:#0d47a1"></div>採点中
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background:#1b3a1f"></div>完了
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background:#3a1b00;border:1px solid #ff9800"></div>要確認
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background:#1a237e"></div>確定
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="border:2px solid #2196f3"></div>自分が担当
        </div>
    </div>

    <div class="q-grid" id="q-grid"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDk-RpKCX5Hd-xNnrso_x5fd3S-vUoWKUc",
            authDomain: "ciq-saiten.firebaseapp.com",
            databaseURL: "https://ciq-saiten-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ciq-saiten",
            storageBucket: "ciq-saiten.firebasestorage.app",
            messagingSenderId: "987606904586",
            appId: "1:987606904586:web:b16876b8963a55a60d94f3"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const scorerName = sessionStorage.getItem('scorer_name');
        const scorerRole = sessionStorage.getItem('scorer_role');

        if (!scorerName) {
            location.href = 'index.html';
        }

        document.getElementById('scorer-badge').textContent = `${scorerName}（${scorerRole === 'admin' ? '管理者' : '採点者'}）`;
        if (scorerRole === 'admin') {
            document.getElementById('admin-btn').style.display = 'block';
        }

        // 100問グリッド初期化
        const qGrid = document.getElementById('q-grid');
        for (let i = 1; i <= 100; i++) {
            const card = document.createElement('div');
            card.className = 'q-card';
            card.id = `qcard-${i}`;
            card.innerHTML = `
        <div class="q-num">${i}問</div>
        <div class="q-scorers" id="qscorers-${i}"></div>
        <div class="q-status status-open" id="qstatus-${i}">未着手</div>
      `;
            card.onclick = () => enterQ(i);
            qGrid.appendChild(card);
        }

        // リアルタイム監視
        db.ref('scores').on('value', snap => {
            const scores = snap.val() || {};
            updateGrid(scores);
        });

        function updateGrid(scores) {
            for (let q = 1; q <= 100; q++) {
                // この問題を担当してる採点者を集計
                const scorers = {}; // {scorerName: {completed: bool}}

                // scoresからこの問題の採点者を抽出
                Object.values(scores).forEach(entryScores => {
                    const qScores = entryScores[`q${q}`] || {};
                    Object.keys(qScores).forEach(name => {
                        if (name !== '__completed') {
                            if (!scorers[name]) scorers[name] = { completed: false };
                        }
                    });
                });

                // 完了フラグ確認
                const completedSnap = scores[`__completed__q${q}`] || {};
                Object.keys(completedSnap).forEach(name => {
                    if (!scorers[name]) scorers[name] = {};
                    scorers[name].completed = true;
                });

                const scorerNames = Object.keys(scorers);
                const completedCount = Object.values(scorers).filter(s => s.completed).length;
                const isMine = scorerNames.includes(scorerName);
                const isFull = scorerNames.length >= 3 && !isMine;
                const allDone = scorerNames.length >= 3 && completedCount >= 3;

                // 食い違いチェック
                let hasConflict = false;
                if (allDone) {
                    // 答案ごとにこの問題の結果を比較
                    // entryNumbersを取得して比較
                    hasConflict = checkConflict(scores, q);
                }

                // confirmed確認
                const isConfirmed = scores[`__final__q${q}`] !== undefined;

                // カードの状態更新
                const card = document.getElementById(`qcard-${q}`);
                const statusEl = document.getElementById(`qstatus-${q}`);
                const scorersEl = document.getElementById(`qscorers-${q}`);

                card.className = 'q-card';
                if (isMine) card.classList.add('mine');
                if (isFull) card.classList.add('locked');

                scorersEl.innerHTML = scorerNames.map(name => {
                    const done = scorers[name].completed;
                    return `${done ? '✓' : '…'} ${name}`;
                }).join('<br>');

                if (isConfirmed) {
                    card.classList.add('confirmed');
                    statusEl.className = 'q-status status-confirmed';
                    statusEl.textContent = '確定';
                } else if (hasConflict) {
                    card.classList.add('conflict');
                    statusEl.className = 'q-status status-conflict';
                    statusEl.textContent = '要確認';
                } else if (allDone) {
                    card.classList.add('done');
                    statusEl.className = 'q-status status-done';
                    statusEl.textContent = '完了';
                } else if (scorerNames.length > 0) {
                    statusEl.className = 'q-status status-inprogress';
                    statusEl.textContent = `採点中 ${scorerNames.length}/3`;
                } else {
                    statusEl.className = 'q-status status-open';
                    statusEl.textContent = '未着手';
                }

                if (isFull && !isMine) {
                    statusEl.className = 'q-status status-locked';
                    statusEl.textContent = '満員';
                }
            }
        }

        function checkConflict(scores, q) {
            const entryNumbers = Object.keys(scores).filter(k => !k.startsWith('__'));
            for (const entryNum of entryNumbers) {
                const qScores = scores[entryNum]?.[`q${q}`] || {};
                const vals = Object.values(qScores).filter(v => v !== undefined);
                if (vals.length >= 2) {
                    const corrects = vals.filter(v => v === 'correct').length;
                    const wrongs = vals.filter(v => v === 'wrong').length;
                    if (corrects > 0 && wrongs > 0) return true;
                }
            }
            return false;
        }

        function enterQ(q) {
            // ロック確認
            const card = document.getElementById(`qcard-${q}`);
            if (card.classList.contains('locked')) {
                alert('この問題はすでに3人が採点中です');
                return;
            }
            sessionStorage.setItem('current_q', q);
            location.href = `question.html`;
        }
    </script>
</body>

</html>
