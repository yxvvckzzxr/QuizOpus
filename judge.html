<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src https://fonts.gstatic.com https://cdnjs.cloudflare.com; connect-src 'self' https://quziopus-default-rtdb.asia-southeast1.firebasedatabase.app https://firebasestorage.googleapis.com https://script.google.com; img-src 'self' data: blob: https://firebasestorage.googleapis.com;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="description" content="QuizOpus - クイズ大会の解答採点を支援するウェブプラットフォーム。リアルタイム採点・成績開示・参加者管理をワンストップで。">
    <meta property="og:title" content="QuizOpus - 解答採点プラットフォーム">
    <meta property="og:description" content="クイズ大会の解答採点を支援するウェブプラットフォーム">
    <meta property="og:type" content="website">
    <meta property="og:image" content="favicon.png">
    <title>QuizOpus - 問題一覧</title>
    <script src="js/config.js"></script>
    <script src="js/crypto.js"></script>
    <script src="js/shared.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/design_system.css">
    <style>
        body { padding: 24px; }

        .header-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 12px; }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .header-right { display: flex; align-items: center; gap: 8px; }


        .legend {
            display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap;
            padding: 12px 16px; border-radius: var(--radius-md);
            background: rgba(15,23,42,0.5); border: 1px solid var(--glass-border);
            font-size: 12px; font-weight: 600; color: var(--text-muted);
        }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .legend-dot { width: 14px; height: 14px; border-radius: 4px; }

        .q-grid { display: grid; gap: 12px; }

        .q-card {
            background: var(--glass-bg); backdrop-filter: blur(8px);
            border-radius: var(--radius-md); padding: 14px; text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-sm); display: flex; flex-direction: column;
            min-height: 120px; overflow: hidden;
        }
        .q-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); background: rgba(30,41,59,0.8); }
        .q-card.mine { border-color: rgba(59,130,246,0.5); box-shadow: 0 0 15px rgba(59,130,246,0.15); }
        .q-card.locked { opacity: 0.5; cursor: not-allowed; }
        .q-card.done { border-color: rgba(16,185,129,0.4); }
        .q-card.inprogress { border-color: rgba(59,130,246,0.3); }

        .q-num { font-size: 18px; font-weight: 800; color: var(--text-main); margin-bottom: 8px; }
        .q-scorers { font-size: 11px; color: var(--text-muted); min-height: 40px; margin-bottom: 8px; line-height: 1.4; display: flex; align-items: center; justify-content: center; }
        .q-status { padding: 6px 0; border-radius: var(--radius-sm); font-size: 11px; font-weight: 700; margin-top: auto; }

        .status-open { background: rgba(255,255,255,0.05); color: var(--text-muted); }
        .status-inprogress { background: rgba(59,130,246,0.15); color: #60a5fa; }
        .status-done { background: rgba(16,185,129,0.15); color: #34d399; }
        .status-locked { background: rgba(239,68,68,0.1); color: #f87171; }

        /* Snap Grid: 2 -> 5 -> 8 -> 10 */
        .q-grid { grid-template-columns: repeat(2, 1fr); }
        @media (min-width: 600px) { .q-grid { grid-template-columns: repeat(5, 1fr); } }
        @media (min-width: 1024px) { .q-grid { grid-template-columns: repeat(8, 1fr); } }
    </style>
</head>

<body>
    <div class="header-bar">
        <div class="header-left">
            <h1 id="project-title"><i class="fa-solid fa-spinner fa-spin-pulse"></i> 読み込み中...</h1>
        </div>
        <div class="header-right">
            <button class="menu-trigger" onclick="toggleMenu()">
                <div class="trigger-icon"><span></span><span></span><span></span></div>
                メニュー
            </button>
        </div>
    </div>

    <!-- Slide Panel Menu -->
    <div class="menu-backdrop" id="menu-backdrop" onclick="toggleMenu()"></div>
    <div class="menu-panel" id="menu-panel">
        <button class="menu-panel-close" onclick="toggleMenu()"><i class="fa-solid fa-xmark"></i></button>

        <div class="menu-profile">
            <div class="menu-avatar"><i class="fa-solid fa-user"></i></div>
            <div class="menu-profile-name" id="menu-scorer-name"></div>
            <div id="menu-scorer-role"></div>
        </div>

        <div id="admin-menu-section" style="display:none">
            <div class="menu-section">
                <div class="menu-section-label">管理</div>
                <button class="menu-item" onclick="location.href='admin.html'">
                    <i class="fa-solid fa-gauge"></i> 管理画面
                </button>
                <button class="menu-item warn" onclick="location.href='conflict.html'">
                    <i class="fa-solid fa-triangle-exclamation"></i> 要確認
                </button>
            </div>
            <div class="menu-divider"></div>
        </div>

        <div class="menu-section">
            <div class="menu-section-label">ツール</div>
            <button class="menu-item" onclick="location.href='checkin.html'">
                <i class="fa-solid fa-qrcode"></i> 当日受付
            </button>
            <button class="menu-item" onclick="window.open('entry.html?pid='+projectId,'_blank')">
                <i class="fa-solid fa-pen-to-square"></i> エントリーフォーム
            </button>
            <button class="menu-item" onclick="window.open('entry_list.html?pid='+projectId,'_blank')">
                <i class="fa-solid fa-list"></i> エントリーリスト
            </button>
        </div>

        <div class="menu-footer">
            <button class="menu-item danger" onclick="logout()">
                <i class="fa-solid fa-right-from-bracket"></i> ログアウト
            </button>
        </div>
    </div>



    <div class="q-grid" id="q-grid"></div>

    <script src="js/judge.js"></script>
</body>

</html>
