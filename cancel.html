<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizOpus - キャンセルフォーム</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="js/config.js"></script>
    <script src="js/crypto.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/design_system.css">
    <style>
        .warning-box {
            margin-bottom: 20px; font-size: 13px; color: var(--warning);
            background: rgba(245,158,11,0.08); padding: 14px 16px; border-radius: var(--radius-md);
            border: 1px solid rgba(245,158,11,0.2); line-height: 1.7;
        }
        .form-group { margin-bottom: 18px; }
    </style>
</head>
<body class="page-wrapper">
    <div class="page-container">
        <div class="page-logo">
            <span class="logo-icon"><i class="fa-solid fa-user-xmark"></i></span>
            <h1 id="cancel-title"><i class="fa-solid fa-spinner fa-spin"></i> 読み込み中...</h1>
            <div class="logo-sub" id="cancel-subtitle">キャンセルフォーム</div>
        </div>

        <div class="page-card" id="form-card">
            <div class="warning-box">
                <i class="fa-solid fa-triangle-exclamation"></i> キャンセルをするとエントリーは無効となり、取り消すことはできません。<br>
                <i class="fa-solid fa-circle-info"></i> 受付番号は欠番となります。
            </div>

            <div class="form-group">
                <label><i class="fa-solid fa-hashtag"></i> 受付番号</label>
                <input type="text" class="page-input" id="f-number" required placeholder="例: 12">
            </div>

            <div class="form-group">
                <label><i class="fa-solid fa-envelope"></i> 登録メールアドレス</label>
                <input type="email" class="page-input" id="f-email" required placeholder="example@gmail.com">
            </div>

            <div class="form-group">
                <label><i class="fa-solid fa-key"></i> パスワード (連携用英数字6桁)</label>
                <input type="text" class="page-input" id="f-password" required placeholder="------">
            </div>

            <button class="page-btn danger" id="submit-btn" onclick="processCancel()"><i class="fa-solid fa-trash"></i> キャンセルを確定する</button>
            <div class="page-msg" id="status-msg"></div>
        </div>

        <div class="page-footer">Powered by QuizOpus</div>
    </div>

    <script src="js/cancel.js"></script>
</body>
</html>
