<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizOpus - エントリーリスト</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="js/config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/design_system.css">
    <style>
        .stat-badge {
            display: inline-flex; align-items: center; gap: 10px;
            padding: 12px 24px; margin-bottom: 24px;
        }
        .stat-badge .stat-val {
            font-size: 28px; font-weight: 800; color: var(--primary);
            background: linear-gradient(135deg, #60a5fa, var(--primary));
            -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
        }
        .stat-badge .stat-label { font-size: 14px; color: var(--text-muted); font-weight: 600; }

        .list-container {
            border-radius: var(--radius-lg); overflow: hidden;
            border: 1px solid var(--glass-border);
            background: rgba(15, 23, 42, 0.4);
        }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
        th {
            background: rgba(30, 41, 59, 0.8); color: var(--text-muted);
            font-weight: 600; padding: 14px 16px; text-transform: uppercase;
            letter-spacing: 0.05em; font-size: 11px;
            border-bottom: 1px solid var(--glass-border);
        }
        td {
            padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,0.05);
            vertical-align: middle;
        }
        tbody tr { transition: background 0.15s; }
        tbody tr:hover { background: rgba(255,255,255,0.03); }

        .c-time { color: var(--text-muted); font-size: 12px; white-space: nowrap; }
        .c-name { font-size: 16px; font-weight: 700; }
        .c-affil { color: #60a5fa; }
        .c-msg { font-size: 13px; color: var(--text-muted); line-height: 1.4; word-break: break-word; font-style: italic; }

        @media (max-width: 600px) {
            table, thead, tbody, th, td, tr { display: block; }
            thead tr { display: none; }
            tr { padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.1); }
            td { padding: 4px 0; border: none; }
            .c-time { margin-bottom: 6px; }
            .c-affil, .c-grade { display: inline-block; margin-right: 8px; font-size: 13px; }
            .c-msg { margin-top: 8px; padding-top: 8px; border-top: 1px dashed rgba(255,255,255,0.1); }
        }
    </style>
</head>
<body class="page-wrapper">
    <div class="page-container full">
        <div class="page-logo">
            <span class="logo-icon"><i class="fa-solid fa-clipboard-list"></i></span>
            <h1 id="page-title"><i class="fa-solid fa-spinner fa-spin"></i> 読み込み中...</h1>
            <div class="logo-sub" id="page-subtitle">エントリーリスト</div>
        </div>

        <div id="content-area" style="display:none">
            <div style="text-align:center">
                <div class="stat-badge glass-panel">
                    <span class="stat-val" id="total-count">-</span>
                    <span class="stat-label"><i class="fa-solid fa-user-check"></i> 名 エントリー済</span>
                </div>
            </div>

            <div class="list-container">
                <table>
                    <thead>
                        <tr>
                            <th><i class="fa-regular fa-calendar"></i> エントリー日時</th>
                            <th><i class="fa-solid fa-school"></i> 所属</th>
                            <th><i class="fa-solid fa-graduation-cap"></i> 学年</th>
                            <th><i class="fa-solid fa-id-badge"></i> エントリーネーム</th>
                            <th><i class="fa-solid fa-comment"></i> 意気込み</th>
                        </tr>
                    </thead>
                    <tbody id="list-body">
                        <tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:32px"><i class="fa-solid fa-spinner fa-spin"></i> 読み込み中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="page-card page-disabled" id="disabled-msg">
            <i class="fa-solid fa-lock"></i>
            現在エントリーリストは非公開です。
        </div>

        <div class="page-footer">Powered by QuizOpus</div>
    </div>

    <script src="js/entry_list.js"></script>
</body>
</html>
