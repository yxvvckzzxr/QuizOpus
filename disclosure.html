<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizOpus - 成績開示</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="js/config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/design_system.css">
    <style>
        body {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 24px;
        }
        .container { width: 100%; max-width: 480px; }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo h1 { font-size: 28px; font-weight: 800; }
        .logo p { color: var(--text-muted); font-size: 14px; margin-top: 8px; }

        .login-input {
            width: 100%; padding: 14px 16px; border-radius: var(--radius-md);
            border: 1px solid var(--glass-border); background: rgba(15,23,42,0.6);
            color: var(--text-main); font-size: 18px; font-family: 'Courier New', monospace;
            letter-spacing: 4px; text-align: center; outline: none;
            transition: all 0.2s;
        }
        .login-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59,130,246,0.2); }
        .login-input::placeholder { letter-spacing: 0; font-size: 14px; color: #475569; font-family: var(--font-family); }

        .submit-btn {
            width: 100%; padding: 16px; border-radius: var(--radius-md); border: none;
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: white; font-size: 16px; font-weight: 600; cursor: pointer;
            margin-top: 24px; transition: all 0.2s; font-family: var(--font-family);
            box-shadow: var(--shadow-md);
        }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: var(--shadow-glow); }
        .submit-btn:active { transform: translateY(0); }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .error-msg {
            margin-top: 16px; padding: 12px; border-radius: var(--radius-md);
            background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
            color: #f87171; font-size: 14px; text-align: center; display: none;
        }

        /* Results */
        .result { display: none; }
        .result-header {
            text-align: center; margin-bottom: 24px;
            padding-bottom: 20px; border-bottom: 1px solid var(--glass-border);
        }
        .result-name { font-size: 22px; font-weight: 800; }
        .result-score {
            font-size: 64px; font-weight: 800; margin: 12px 0;
            background: linear-gradient(135deg, #60a5fa, var(--primary));
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent; color: transparent;
        }
        .result-score-label { font-size: 14px; color: var(--text-muted); }

        .result-grid-label { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; font-weight: 600; }
        .result-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; margin-top: 8px; }
        .result-cell {
            aspect-ratio: 1; border-radius: 6px; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            font-size: 10px; font-weight: 600; transition: transform 0.15s;
        }
        .result-cell:hover { transform: scale(1.15); }
        .result-cell .q-num { font-size: 8px; color: rgba(255,255,255,0.5); margin-bottom: 1px; }
        .result-cell.correct { background: rgba(16,185,129,0.2); color: #34d399; border: 1px solid rgba(16,185,129,0.3); }
        .result-cell.wrong { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }

        .back-btn {
            display: block; margin: 24px auto 0; padding: 10px 24px;
            border-radius: var(--radius-md); border: 1px solid var(--glass-border);
            background: transparent; color: var(--text-muted); font-size: 14px;
            cursor: pointer; font-family: var(--font-family); transition: all 0.2s;
        }
        .back-btn:hover { color: white; background: rgba(255,255,255,0.05); }

        .disabled-msg { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1 id="logo-title"><i class="fa-solid fa-chart-column"></i> 成績開示</h1>
            <p id="logo-subtitle">Score Disclosure</p>
        </div>

        <div class="glass-panel" id="login-card">
            <label><i class="fa-solid fa-hashtag"></i> 受付番号</label>
            <input type="text" class="login-input" id="entry-number" maxlength="3" placeholder="001" inputmode="numeric" autocomplete="off">
            <label style="margin-top:18px"><i class="fa-solid fa-key"></i> 開示用パスワード</label>
            <input type="text" class="login-input" id="pw-input" maxlength="6" placeholder="英数字6桁" autocomplete="off">
            <button class="submit-btn" id="submit-btn" onclick="checkDisclosure()"><i class="fa-solid fa-unlock"></i> 成績を確認する</button>
            <div class="error-msg" id="error-msg"></div>
        </div>

        <div class="glass-panel result" id="result-card">
            <div class="result-header">
                <div class="result-name" id="result-name"></div>
                <div class="result-score" id="result-score"></div>
                <div class="result-score-label"><i class="fa-solid fa-calculator"></i> 点 / <span id="result-total">100</span>問</div>
            </div>
            <div class="result-grid-label"><i class="fa-solid fa-th"></i> 各問の正誤</div>
            <div class="result-grid" id="result-grid"></div>
            <button class="back-btn" onclick="showLogin()"><i class="fa-solid fa-arrow-left"></i> 戻る</button>
        </div>

        <div class="glass-panel disabled-msg" id="disabled-card" style="display:none">
            <i class="fa-solid fa-lock" style="font-size:32px; margin-bottom:12px; display:block;"></i>
            <p>成績開示は現在無効です。</p>
            <p style="margin-top:8px;font-size:13px">管理者が開示を有効にするまでお待ちください。</p>
        </div>
    </div>

    <script src="js/disclosure.js"></script>
</body>
</html>
