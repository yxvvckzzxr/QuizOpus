<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src https://fonts.gstatic.com https://cdnjs.cloudflare.com; connect-src 'self' https://quziopus-default-rtdb.asia-southeast1.firebasedatabase.app https://firebasestorage.googleapis.com https://script.google.com; img-src 'self' data: blob: https://firebasestorage.googleapis.com;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="description" content="QuizOpus - クイズ大会の解答採点を支援するウェブプラットフォーム。リアルタイム採点・成績開示・参加者管理をワンストップで。">
    <meta property="og:title" content="QuizOpus - 解答採点プラットフォーム">
    <meta property="og:description" content="クイズ大会の解答採点を支援するウェブプラットフォーム">
    <meta property="og:type" content="website">
    <meta property="og:image" content="favicon.png">
    <title>QuizOpus - 成績開示</title>
    <script src="js/config.js"></script>
    <script src="js/crypto.js"></script>
    <script src="js/shared.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/design_system.css">
    <style>
        .login-input {
            width: 100%; padding: 14px 16px; border-radius: var(--radius-md);
            border: 1px solid var(--glass-border); background: rgba(15,23,42,0.6);
            color: var(--text-main); font-size: 18px; font-family: 'Courier New', monospace;
            letter-spacing: 4px; text-align: center; outline: none;
            transition: all 0.2s; box-sizing: border-box;
        }
        .login-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
        .login-input::placeholder { letter-spacing: 0; font-size: 14px; color: #475569; font-family: var(--font-family); }

        .form-group { margin-bottom: 18px; }

        /* Results */
        .result { display: none; }
        .result-header {
            text-align: center; margin-bottom: 24px;
            padding-bottom: 20px; border-bottom: 1px solid var(--glass-border);
        }
        .result-name { font-size: 22px; font-weight: 800; }
        .result-score {
            font-size: 64px; font-weight: 800; margin: 12px 0;
            background: linear-gradient(135deg, #60a5fa, var(--primary));
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent; color: transparent;
        }
        .result-score-label { font-size: 14px; color: var(--text-muted); }

        .result-grid-label { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; font-weight: 600; }
        .result-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; margin-top: 8px; }
        .result-cell {
            aspect-ratio: 1; border-radius: 6px; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            font-size: 10px; font-weight: 600; transition: transform 0.15s;
        }
        .result-cell:hover { transform: scale(1.15); }
        .result-cell .q-num { font-size: 8px; color: rgba(255,255,255,0.5); margin-bottom: 1px; }
        .result-cell.correct { background: rgba(16,185,129,0.2); color: #34d399; border: 1px solid rgba(16,185,129,0.3); }
        .result-cell.wrong { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }

        .back-btn {
            display: block; margin: 20px auto 0; padding: 10px 24px;
            border-radius: var(--radius-md); border: 1px solid var(--glass-border);
            background: transparent; color: var(--text-muted); font-size: 14px;
            cursor: pointer; font-family: var(--font-family); transition: all 0.2s;
        }
        .back-btn:hover { color: white; background: rgba(255,255,255,0.05); }
    </style>
</head>
<body class="page-wrapper">
    <div class="page-container">
        <div class="page-logo">
            <span class="logo-icon"><i class="fa-solid fa-chart-column"></i></span>
            <h1 id="logo-title"><i class="fa-solid fa-spinner fa-spin"></i> 読み込み中...</h1>
            <div class="logo-sub" id="logo-subtitle">成績開示</div>
        </div>

        <div class="page-card" id="login-card">
            <div class="form-group">
                <label><i class="fa-solid fa-hashtag"></i> 受付番号</label>
                <input type="text" class="login-input" id="entry-number" maxlength="3" placeholder="001" inputmode="numeric" autocomplete="off">
            </div>
            <div class="form-group">
                <label><i class="fa-solid fa-key"></i> 開示用パスワード</label>
                <input type="text" class="login-input" id="pw-input" maxlength="6" placeholder="英数字6桁" autocomplete="off">
            </div>
            <button class="page-btn" id="submit-btn" onclick="checkDisclosure()"><i class="fa-solid fa-unlock"></i> 成績を確認する</button>
            <div class="page-msg error" id="error-msg"></div>
        </div>

        <div class="page-card result" id="result-card">
            <div class="result-header">
                <div class="result-name" id="result-name"></div>
                <div class="result-score" id="result-score"></div>
                <div class="result-score-label"><i class="fa-solid fa-calculator"></i> 点 / <span id="result-total">100</span>問</div>
            </div>
            <div class="result-grid-label"><i class="fa-solid fa-th"></i> 各問の正誤</div>
            <div class="result-grid" id="result-grid"></div>
            <button class="back-nav-btn" onclick="showLogin()" style="margin:20px auto 0;display:flex"><i class="fa-solid fa-chevron-left"></i> 戻る</button>
        </div>

        <div class="page-footer">Powered by QuizOpus</div>
    </div>

    <script src="js/disclosure.js"></script>
</body>
</html>
