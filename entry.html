<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src https://fonts.gstatic.com https://cdnjs.cloudflare.com; connect-src 'self' https://quziopus-default-rtdb.asia-southeast1.firebasedatabase.app https://firebasestorage.googleapis.com https://script.google.com; img-src 'self' data: blob: https://firebasestorage.googleapis.com;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="description" content="QuizOpus - クイズ大会の解答採点を支援するウェブプラットフォーム。リアルタイム採点・成績開示・参加者管理をワンストップで。">
    <meta property="og:title" content="QuizOpus - 解答採点プラットフォーム">
    <meta property="og:description" content="クイズ大会の解答採点を支援するウェブプラットフォーム">
    <meta property="og:type" content="website">
    <meta property="og:image" content="favicon.png">
    <title>QuizOpus - エントリー</title>
    <script src="js/config.js"></script>
    <script src="js/crypto.js"></script>
    <script src="js/shared.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/design_system.css">
    <style>
        .form-group { margin-bottom: 20px; }
        .form-row { display: flex; gap: 16px; }
        .form-row .form-group { flex: 1; }
        .required::after { content: " *"; color: var(--danger); }
        .hint { font-size: 12px; color: var(--text-muted); margin-top: 6px; }

        input[type="email"], textarea {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 12px 14px;
            border-radius: var(--radius-md);
            font-size: 14px;
            width: 100%;
            box-sizing: border-box;
            outline: none;
            transition: all 0.2s ease;
            font-family: var(--font-family);
        }
        input[type="email"]:focus, textarea:focus {
            border-color: var(--primary);
            background: rgba(15, 23, 42, 0.9);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
        textarea { resize: vertical; min-height: 100px; }
        input::placeholder, textarea::placeholder { color: #475569; }

        .checkbox-label {
            display: flex; align-items: flex-start; gap: 10px;
            cursor: pointer; font-size: 13px; color: var(--text-muted); line-height: 1.5;
        }
        .checkbox-label input[type="checkbox"] { margin-top: 2px; }

        .page-msg.info { background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.3); color: #60a5fa; }

        .result-info-box {
            background: rgba(15, 23, 42, 0.6); padding: 24px;
            border-radius: var(--radius-md); margin-bottom: 24px;
            border: 1px solid var(--glass-border);
        }
        .result-info-box .info-label { color: var(--text-muted); font-size: 12px; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
        .result-info-box .info-value { font-size: 32px; font-weight: 800; color: var(--primary); margin-bottom: 16px; }
        .pw-display {
            font-size: 22px; font-family: 'Courier New', monospace; letter-spacing: 4px; font-weight: bold;
            background: rgba(0,0,0,0.3); padding: 10px 16px; border-radius: var(--radius-sm); color: var(--text-main);
        }
        .pw-warning { color: #f87171; font-size: 12px; font-weight: 700; margin-top: 12px; }
    </style>
</head>

<body class="page-wrapper">
    <div class="page-container" style="max-width:600px">
        <div class="page-logo">
            <span class="logo-icon"><i class="fa-solid fa-pen-to-square"></i></span>
            <h1 id="project-title"><i class="fa-solid fa-spinner fa-spin"></i> 読み込み中...</h1>
            <div class="logo-sub" id="project-subtitle">エントリーフォーム</div>
        </div>

        <div class="page-card" id="disabled-card" style="display:none;text-align:center;padding:40px 28px">
            <i class="fa-solid fa-door-closed" style="font-size:40px;display:block;margin-bottom:16px;color:var(--text-muted)"></i>
            <h2 id="disabled-title" style="margin-bottom:12px;font-size:18px">受付は現在停止中です</h2>
            <p id="disabled-detail" style="color:var(--text-muted);font-size:14px;line-height:1.6">管理者が受付を再開するまでお待ちください。</p>
        </div>

        <div class="page-card" id="form-card">
            <form id="entry-form">
                <div class="form-group">
                    <label class="required"><i class="fa-solid fa-envelope"></i> メールアドレス</label>
                    <input type="email" id="f-email" required placeholder="example@gmail.com">
                    <div class="hint"><i class="fa-solid fa-circle-info"></i> QRコードと開示用パスワードが送信されます。</div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="required"><i class="fa-solid fa-user"></i> 姓 (全角)</label>
                        <input type="text" id="f-family-name" required placeholder="山田">
                    </div>
                    <div class="form-group">
                        <label class="required">名 (全角)</label>
                        <input type="text" id="f-first-name" required placeholder="太郎">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="required">セイ (全角カタカナ)</label>
                        <input type="text" id="f-family-kana" required placeholder="ヤマダ" pattern="^[ァ-ヴー]+$"
                            title="全角カタカナで入力してください">
                    </div>
                    <div class="form-group">
                        <label class="required">メイ (全角カタカナ)</label>
                        <input type="text" id="f-first-kana" required placeholder="タロウ" pattern="^[ァ-ヴー]+$"
                            title="全角カタカナで入力してください">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group" style="flex:2">
                        <label class="required"><i class="fa-solid fa-school"></i> 所属教育機関</label>
                        <input type="text" id="f-affiliation" required placeholder="○○大">
                    </div>
                    <div class="form-group" style="flex:1">
                        <label class="required"><i class="fa-solid fa-graduation-cap"></i> 学年</label>
                        <select id="f-grade" class="custom-select" required>
                            <option value="">選択</option>
                            <option value="１年">１年</option>
                            <option value="２年">２年</option>
                            <option value="３年">３年</option>
                            <option value="４年">４年</option>
                            <option value="５年">５年</option>
                            <option value="６年">６年</option>
                            <option value="非表示">非表示</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label class="required"><i class="fa-solid fa-id-badge"></i> エントリーネーム</label>
                    <input type="text" id="f-entry-name" required placeholder="エントリーシートでの表示名">
                </div>

                <div class="form-group">
                    <label><i class="fa-solid fa-comment"></i> 意気込み</label>
                    <input type="text" id="f-message" placeholder="大会への意気込みをどうぞ！(公開されます)">
                </div>

                <div class="form-group">
                    <label><i class="fa-solid fa-message"></i> 運営への連絡 (任意)</label>
                    <textarea id="f-inquiry" placeholder="配慮事項などがあればご記入ください"></textarea>
                </div>

                <div class="form-group" style="margin-top: 24px;">
                    <label class="custom-checkbox">
                        <input type="checkbox" id="f-tos" required>
                        <span class="checkbox-mark"><i class="fa-solid fa-check"></i></span>
                        <span>私は大会の参加規約および<a href="legal.html" target="_blank" style="color:#60a5fa;text-decoration:underline">プライバシーポリシー・利用規約</a>に同意し、入力した情報が正確であることを確認しました。<br>
                            <span style="color:#f87171;font-size:12px"><i class="fa-solid fa-circle-exclamation"></i>
                                受付コードはメールで送信されます。メール受信に同意の上、受信可能なアドレスであることを必ず確認してください。</span></span>
                    </label>
                </div>

                <button type="submit" class="page-btn" id="submit-btn"><i class="fa-solid fa-paper-plane"></i> エントリーを確定する</button>
            </form>
            <div class="page-msg" id="status-msg"></div>
        </div>

        <div class="page-card" id="result-card" style="display:none; text-align:center;">
            <h2 style="color: #34d399; margin-bottom: 16px;"><i class="fa-solid fa-circle-check"></i> エントリー完了！</h2>
            <p style="margin-bottom: 24px; color: var(--text-muted);">以下の情報で受付いたしました。<br>メールアドレスにも同じ情報をお送りしています。</p>

            <div class="result-info-box">
                <div class="info-label"><i class="fa-solid fa-hashtag"></i> あなたの受付番号</div>
                <div class="info-value" id="r-entry-number">---</div>

                <div class="info-label"><i class="fa-solid fa-key"></i> 成績開示・キャンセル用パスワード</div>
                <div class="pw-display" id="r-password">------</div>
                <div class="pw-warning"><i class="fa-solid fa-triangle-exclamation"></i> このパスワードは再発行できません。必ずスクリーンショット等で保存してください。</div>
            </div>

            <button class="btn secondary" onclick="location.reload()"><i class="fa-solid fa-rotate-right"></i> 新しいエントリーを行う</button>
        </div>

        <div class="page-footer">Powered by QuizOpus</div>
    </div>

    <script src="js/entry.js"></script>
</body>

</html>
