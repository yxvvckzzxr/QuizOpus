<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizOpus - 要確認</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="js/config.js"></script>
    <script src="js/crypto.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/design_system.css">
    <style>
        body { padding: 24px; }

        .top-bar {
            display: flex; align-items: center; gap: 12px; margin-bottom: 24px;
        }
        .top-bar h1 { font-size: 20px; }

        .counter {
            padding: 6px 16px; border-radius: var(--radius-pill); font-size: 13px;
            font-weight: 600; margin-left: auto;
        }
        .counter.has-conflicts { background: rgba(245,158,11,0.2); color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); }
        .counter.all-clear { background: rgba(16,185,129,0.2); color: #34d399; border: 1px solid rgba(16,185,129,0.3); }

        .conflict-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .conflict-card {
            background: linear-gradient(145deg, rgba(30,41,59,0.6), rgba(15,23,42,0.8));
            border-radius: var(--radius-lg); padding: 20px;
            border: 2px solid rgba(245,158,11,0.3);
            cursor: pointer; transition: all 0.2s;
        }
        .conflict-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); border-color: rgba(245,158,11,0.5); }
        .conflict-card.resolved { border-color: rgba(16,185,129,0.3); opacity: 0.6; }
        .conflict-card.selected { box-shadow: 0 0 0 3px var(--primary); border-color: var(--primary); }

        .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
        .q-tag { background: rgba(59,130,246,0.15); color: #60a5fa; padding: 5px 12px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 700; border: 1px solid rgba(59,130,246,0.3); }
        .entry-tag { color: var(--text-main); font-size: 13px; font-weight: 600; }

        .answer-img { width: 100%; height: 80px; object-fit: contain; background: white; border-radius: var(--radius-sm); margin-bottom: 12px; }

        .model-answer {
            background: rgba(16,185,129,0.1); padding: 8px 12px; border-radius: var(--radius-sm);
            font-size: 13px; font-weight: 700; color: #34d399; margin-bottom: 14px; text-align: center;
            border: 1px solid rgba(16,185,129,0.2);
        }

        .scorer-votes { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
        .vote-item {
            display: flex; justify-content: space-between; align-items: center; font-size: 13px;
            padding: 8px 12px; border-radius: var(--radius-sm);
            background: rgba(15,23,42,0.5); border: 1px solid rgba(255,255,255,0.05);
        }
        .vote-correct { color: #34d399; font-weight: 700; }
        .vote-wrong { color: #f87171; font-weight: 700; }
        .vote-hold { color: #fbbf24; font-weight: 700; }

        .final-result {
            text-align: center; padding: 10px; border-radius: var(--radius-sm);
            font-size: 16px; font-weight: 800; margin-top: 4px;
        }
        .final-result.correct { background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.3); }
        .final-result.wrong { background: rgba(239,68,68,0.1); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }

        .no-conflict { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 80px 20px; color: var(--text-muted); font-size: 16px; font-weight: 600; width: 100%; min-height: 50vh; grid-column: 1 / -1; }
        .loading { text-align: center; padding: 40px; color: var(--text-muted); font-weight: 600; }

        .shortcut-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(12px);
            border-top: 1px solid var(--glass-border);
            padding: 12px 20px; display: flex; gap: 24px;
            justify-content: center; font-size: 13px;
            color: var(--text-muted); z-index: 100; font-weight: 600;
        }
        .shortcut-bar kbd {
            background: rgba(255,255,255,0.1); padding: 4px 8px; border-radius: 6px;
            font-family: monospace; font-size: 12px; margin-right: 6px;
            color: white; border: 1px solid rgba(255,255,255,0.2);
        }

        .preview-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            z-index: 1000; display: none; overflow-y: auto; padding: 24px;
        }
        .preview-overlay.show { display: block; animation: fadeIn 0.3s; }
        .preview-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
        .preview-header h2 { font-size: 18px; }
        .preview-close { background: var(--danger); border: none; color: white; padding: 8px 16px; border-radius: var(--radius-sm); cursor: pointer; font-size: 14px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>

<body>
    <div class="header-bar">
        <div class="header-left">
            <button class="btn secondary" onclick="location.href='judge.html'"><i class="fa-solid fa-arrow-left"></i> 戻る</button>
            <h1><i class="fa-solid fa-triangle-exclamation"></i> 要確認</h1>
        </div>
        <div class="header-right">
            <div class="counter has-conflicts" id="counter"><i class="fa-solid fa-spinner fa-spin-pulse"></i> 読み込み中...</div>
        </div>
    </div>

    <div id="conflict-grid" class="conflict-grid">
        <div class="loading"><i class="fa-solid fa-spinner fa-spin"></i> 読み込み中...</div>
    </div>

    <div class="shortcut-bar">
        <span><kbd>M</kbd> <i class="fa-solid fa-circle-check"></i> 正解に確定</span>
        <span><kbd>X</kbd> <i class="fa-solid fa-circle-xmark"></i> 不正解に確定</span>
        <span><kbd>←→↑↓</kbd> <i class="fa-solid fa-arrows-up-down-left-right"></i> 移動</span>
    </div>

    <script src="js/conflict.js"></script>
</body>

</html>
