<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizOpus - 要確認</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="js/config.js"></script>
    <script src="js/crypto.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/design_system.css">
    <style>
        body { padding: 24px; }

        .fixed-header { position: fixed; top: 0; left: 0; right: 0; background: rgba(15, 36, 64, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.1); padding: 12px 20px; display: grid; grid-template-columns: 120px 1fr 120px; gap: 12px; align-items: center; z-index: 100; box-shadow: var(--shadow-md); }
        .fixed-header .header-left, .fixed-header .header-right { display: flex; align-items: center; }
        .fixed-header .header-right { justify-content: flex-end; }
        .fixed-header .header-center { display: flex; align-items: center; justify-content: center; gap: 12px; }

        .counter { padding: 6px 16px; border-radius: var(--radius-pill); font-size: 13px; font-weight: 600; white-space: nowrap; }
        .counter.has-conflicts { background: rgba(245,158,11,0.2); color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); }
        .counter.all-clear { background: rgba(16,185,129,0.2); color: #34d399; border: 1px solid rgba(16,185,129,0.3); }

        .conflict-grid { margin-top: 80px; padding: 20px; display: grid; gap: 10px; grid-template-columns: repeat(2, 1fr); padding-bottom: 60px; }
        @media (min-width: 600px) { .conflict-grid { grid-template-columns: repeat(5, 1fr); } }
        @media (min-width: 1024px) { .conflict-grid { grid-template-columns: repeat(8, 1fr); } }

        .conflict-card { position: relative; background: rgba(30, 41, 59, 0.6); border: 2px solid transparent; border-radius: 10px; padding: 8px; cursor: pointer; transition: all 0.2s; text-align: center; box-shadow: var(--shadow-sm); }
        .conflict-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); background: rgba(30, 41, 59, 0.8); }
        .conflict-card.resolved.correct { border-color: rgba(16, 185, 129, 0.6); background: rgba(16, 185, 129, 0.1); opacity: 0.8; }
        .conflict-card.resolved.wrong { border-color: rgba(239, 68, 68, 0.6); background: rgba(239, 68, 68, 0.1); opacity: 0.8; }
        .conflict-card.selected { box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.5); transform: scale(1.02); z-index: 10; border-color: #3b82f6; }

        .conflict-card img { width: 100%; height: 60px; object-fit: contain; border-radius: 4px; background: white; display: block; }
        .conflict-card .entry-num { font-size: 10px; font-weight: 600; color: var(--text-main); margin-top: 4px; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; justify-content: center; gap: 4px; }
        .conflict-card .votes-mini { display: flex; align-items: center; justify-content: center; gap: 2px; margin-top: 4px; }
        .vote-dot { width: 14px; height: 14px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 900; color: white; text-shadow: 0 1px 1px rgba(0,0,0,0.5); }
        .vote-dot.correct { background: #10b981; }
        .vote-dot.wrong { background: #ef4444; }
        .vote-dot.hold { background: #f59e0b; }
        .model-ans-badge { position: absolute; top: 4px; left: 4px; background: rgba(0,0,0,0.7); color: #60a5fa; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 800; max-width: 60%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .q-tag-badge { position: absolute; top: 4px; right: 4px; background: rgba(59,130,246,0.9); color: white; font-size: 9px; padding: 2px 4px; border-radius: 4px; font-weight: 700; }

        .no-conflict { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 80px 20px; color: var(--text-muted); font-size: 16px; font-weight: 600; width: 100%; grid-column: 1 / -1; }
        .loading { grid-column: 1 / -1; text-align: center; padding: 60px; color: var(--text-muted); font-size: 16px; font-weight: 600; }

        .shortcut-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(12px);
            border-top: 1px solid var(--glass-border);
            padding: 12px 20px; display: flex; gap: 24px;
            justify-content: center; font-size: 13px;
            color: var(--text-muted); z-index: 100; font-weight: 600;
        }
        .shortcut-bar kbd {
            background: rgba(255,255,255,0.1); padding: 4px 8px; border-radius: 6px;
            font-family: monospace; font-size: 12px; margin-right: 6px;
            color: white; border: 1px solid rgba(255,255,255,0.2);
        }

        .preview-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            z-index: 1000; display: none; overflow-y: auto; padding: 24px;
        }
        .preview-overlay.show { display: block; animation: fadeIn 0.3s; }
        .preview-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
        .preview-header h2 { font-size: 18px; }
        .preview-close { background: var(--danger); border: none; color: white; padding: 8px 16px; border-radius: var(--radius-sm); cursor: pointer; font-size: 14px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>

<body>
    <div class="fixed-header">
        <div class="header-left">
            <button class="btn secondary" onclick="location.href='judge.html'" style="padding:6px 12px;font-size:13px"><i class="fa-solid fa-arrow-left"></i> 戻る</button>
        </div>
        <div class="header-center">
            <h1 style="font-size:18px;margin:0;white-space:nowrap;"><i class="fa-solid fa-triangle-exclamation"></i> 要確認</h1>
        </div>
        <div class="header-right">
            <div class="counter has-conflicts" id="counter"><i class="fa-solid fa-spinner fa-spin-pulse"></i> 読み込み中...</div>
        </div>
    </div>

    <div id="conflict-grid" class="conflict-grid">
        <div class="loading"><i class="fa-solid fa-spinner fa-spin"></i> 読み込み中...</div>
    </div>

    <div class="shortcut-bar">
        <span><kbd>M</kbd> <i class="fa-solid fa-circle-check"></i> 正解に確定</span>
        <span><kbd>X</kbd> <i class="fa-solid fa-circle-xmark"></i> 不正解に確定</span>
        <span><kbd>←→↑↓</kbd> <i class="fa-solid fa-arrows-up-down-left-right"></i> 移動</span>
    </div>

    <script src="js/conflict.js"></script>
</body>

</html>
