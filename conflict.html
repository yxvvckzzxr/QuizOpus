<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIQ the 13th 採点システム - 要確認</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="js/config.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: sans-serif;
            background: #1a1a2e;
            color: white;
            min-height: 100vh;
            padding: 20px;
        }

        .top-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 20px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            background: #4caf50;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }

        .btn:hover {
            background: #388e3c;
        }

        .btn.secondary {
            background: #0f3460;
            border: 1px solid #444;
        }

        .btn.secondary:hover {
            background: #1a4a7a;
        }

        .counter {
            background: #e65100;
            padding: 6px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-left: auto;
        }

        .conflict-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
        }

        .conflict-card {
            background: #16213e;
            border-radius: 12px;
            padding: 16px;
            border: 2px solid #ff9800;
            cursor: pointer;
            transition: box-shadow 0.2s;
            content-visibility: auto;
            contain-intrinsic-size: 220px 250px;
        }

        .conflict-card.resolved {
            border-color: #4caf50;
            opacity: 0.6;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .q-tag {
            background: #0f3460;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
        }

        .entry-tag {
            background: #1a237e;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 13px;
        }

        .answer-img {
            width: 100%;
            height: 80px;
            object-fit: contain;
            background: white;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .model-answer {
            background: #1b5e20;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
            color: #a5d6a7;
            margin-bottom: 10px;
            text-align: center;
        }

        .scorer-votes {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 12px;
        }

        .vote-item {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 4px;
            background: #0f3460;
        }

        .vote-correct {
            color: #4caf50;
            font-weight: bold;
        }

        .vote-wrong {
            color: #ef5350;
            font-weight: bold;
        }

        .vote-hold {
            color: #ff9800;
            font-weight: bold;
        }

        .conflict-card.selected {
            box-shadow: 0 0 0 3px #2196f3, 0 0 12px rgba(33, 150, 243, 0.3);
        }

        .final-result {
            text-align: center;
            padding: 8px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            margin-top: 8px;
        }

        .final-result.correct {
            background: #1b5e20;
            color: #4caf50;
        }

        .final-result.wrong {
            background: #3a1b1b;
            color: #ef5350;
        }

        .no-conflict {
            text-align: center;
            padding: 60px;
            color: #aaa;
            font-size: 16px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #aaa;
        }

        .shortcut-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #0f3460;
            border-top: 1px solid #444;
            padding: 8px 20px;
            display: flex;
            gap: 20px;
            justify-content: center;
            font-size: 12px;
            color: #90caf9;
            z-index: 100;
        }
        .shortcut-bar kbd {
            background: #1a237e;
            padding: 2px 8px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 13px;
            margin-right: 4px;
        }
        .preview-overlay { position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:1000;display:none;overflow-y:auto;padding:20px; }
        .preview-overlay.show { display:block; }
        .preview-header { display:flex;align-items:center;justify-content:space-between;margin-bottom:16px; }
        .preview-header h2 { font-size:18px; }
        .preview-close { background:#c62828;border:none;color:white;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:14px; }
        .preview-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px; }
        .preview-grid .pv-item { background:#16213e;border-radius:8px;padding:8px;text-align:center; }
        .preview-grid .pv-item img { width:100%;background:white;border-radius:4px; }
        .preview-grid .pv-item .pv-label { font-size:12px;color:#aaa;margin-top:4px; }
    </style>
</head>

<body>
    <div class="top-bar">
        <button class="btn secondary" onclick="location.href='judge.html'">← 一覧へ</button>
        <h1>要確認一覧</h1>
        <div class="counter" id="counter">読み込み中...</div>
    </div>

    <div id="conflict-grid" class="conflict-grid">
        <div class="loading">読み込み中...</div>
    </div>

    <div class="shortcut-bar">
        <span><kbd>M</kbd> 正解に確定</span>
        <span><kbd>X</kbd> 不正解に確定</span>
        <span><kbd>←→↑↓</kbd> 移動</span>
    </div>

    <script>
const projectId = session.projectId;
        const scorerRole = session.scorerRole;
        if (!projectId || scorerRole !== 'admin') {
            alert('管理者としてプロジェクトに入室してください');
            location.href = 'index.html';
        }

        let answersData = {};
        let answersText = {};
        let scoresData = {};
        let entryNumbers = [];
        let selectedIndex = 0;
        let currentConflicts = [];

        let totalQuestions = 100;

        async function init() {
            const configSnap = await db.ref(`projects/${projectId}/config`).once('value');
            if(configSnap.exists()) {
                totalQuestions = configSnap.val().questionCount || 100;
            }

            try {
                const res = await fetch(`https://ciq-saiten-default-rtdb.asia-southeast1.firebasedatabase.app/projects/${projectId}/answers.json?shallow=true`);
                const data = await res.json();
                if (data) entryNumbers = Object.keys(data).map(Number).sort((a, b) => a - b);
            } catch(e) {
                const answersSnap = await db.ref(`projects/${projectId}/answers`).get();
                if (answersSnap.exists()) {
                    answersData = answersSnap.val();
                    entryNumbers = Object.keys(answersData).map(Number).sort((a, b) => a - b);
                }
            }

            const answersTextSnap = await db.ref(`projects/${projectId}/answers_text`).get();
            if (answersTextSnap.exists()) {
                answersText = answersTextSnap.val();
            }

            db.ref(`projects/${projectId}/scores`).on('value', snap => {
                scoresData = snap.val() || {};
                render();
            });
        }

        function render() {
            const conflicts = [];

            for (let q = 1; q <= totalQuestions; q++) {
                const completedScorers = Object.keys(scoresData[`__completed__q${q}`] || {});
                if (completedScorers.length < 3) continue;

                entryNumbers.forEach(entryNum => {
                    const qScores = scoresData[entryNum]?.[`q${q}`] || {};
                    const entries = Object.entries(qScores);
                    const corrects = entries.filter(([, v]) => v === 'correct').length;
                    const wrongs = entries.filter(([, v]) => v === 'wrong').length;
                    const holds = entries.filter(([, v]) => v === 'hold').length;

                    if ((corrects > 0 && wrongs > 0) || holds > 0) {
                        const finalResult = scoresData[`__final__q${q}`]?.[entryNum];
                        conflicts.push({ q, entryNum, qScores, finalResult });
                    }
                });
            }

            // 画像の必要部分だけダイナミックに一括取得
            const promises = conflicts.map(async c => {
                if (!answersData[c.entryNum]) answersData[c.entryNum] = { cells: {} };
                if (answersData[c.entryNum].cells[`q${c.q}`] === undefined) {
                    const snap = await db.ref(`projects/${projectId}/answers/${c.entryNum}/cells/q${c.q}`).get();
                    answersData[c.entryNum].cells[`q${c.q}`] = snap.val() || null;
                }
            });
            Promise.all(promises).then(() => {

            currentConflicts = conflicts;
            if (selectedIndex >= conflicts.length) selectedIndex = Math.max(0, conflicts.length - 1);

            const unresolvedCount = conflicts.filter(c => !c.finalResult).length;
            document.getElementById('counter').textContent =
                `未確定 ${unresolvedCount}件 / 全${conflicts.length}件`;

            const grid = document.getElementById('conflict-grid');

            if (conflicts.length === 0) {
                grid.innerHTML = '<div class="no-conflict">✅ 要確認はありません</div>';
                return;
            }

            grid.innerHTML = '';

            let masterData = {};
            try { masterData = JSON.parse(localStorage.getItem('masterData') || '{}'); } catch(e) {}

            conflicts.forEach(({ q, entryNum, qScores, finalResult }, idx) => {
                const imageData = answersData[entryNum]?.cells[`q${q}`];
                const modelAnswer = answersText[q] || '';
                const displayName = masterData[entryNum]?.name || `受付番号 ${entryNum}`;

                const card = document.createElement('div');
                card.className = `conflict-card ${finalResult ? 'resolved' : ''} ${idx === selectedIndex ? 'selected' : ''}`;

                const votesHtml = Object.entries(qScores).map(([name, val]) => {
                    let voteText = '';
                    let voteClass = '';
                    if (val === 'correct') { voteText = '○'; voteClass = 'vote-correct'; }
                    else if (val === 'wrong') { voteText = '×'; voteClass = 'vote-wrong'; }
                    else if (val === 'hold') { voteText = '△'; voteClass = 'vote-hold'; }
                    return `
          <div class="vote-item">
            <span>${name}</span>
            <span class="${voteClass}">
              ${voteText}
            </span>
          </div>`;
                }).join('');

                card.innerHTML = `
          <div class="card-header">
            <div class="q-tag">${q}問</div>
            <div class="entry-tag">${displayName}</div>
          </div>
          <img class="answer-img" src="${imageData || ''}" alt="${displayName} ${q}問" loading="lazy" />
          ${modelAnswer ? `<div class="model-answer">${modelAnswer}</div>` : ''}
          <div class="scorer-votes">${votesHtml}</div>
          ${finalResult ? `<div class="final-result ${finalResult}">判定: ${finalResult === 'correct' ? '○' : '×'}</div>` : ''}
        `;
                card.addEventListener('click', () => selectConflictCard(idx));
                card.addEventListener('dblclick', () => showPreview(entryNum));
                grid.appendChild(card);
            });

            scrollToSelectedConflict();
            }); // End of Promise.all
        }

        async function setFinal(q, entryNum, result) {
            await db.ref(`projects/${projectId}/scores/__final__q${q}/${entryNum}`).set(result);
        }

        function selectConflictCard(idx) {
            if (idx < 0 || idx >= currentConflicts.length) return;
            selectedIndex = idx;
            const cards = document.querySelectorAll('.conflict-card');
            cards.forEach((card, i) => card.classList.toggle('selected', i === selectedIndex));
            scrollToSelectedConflict();
        }

        function advanceConflictSelection() {
            if (selectedIndex < currentConflicts.length - 1) {
                selectConflictCard(selectedIndex + 1);
            }
        }

        function getConflictGridCols() {
            const grid = document.getElementById('conflict-grid');
            return getComputedStyle(grid).gridTemplateColumns.split(' ').length;
        }

        function scrollToSelectedConflict() {
            const cards = document.querySelectorAll('.conflict-card');
            if (cards[selectedIndex]) {
                cards[selectedIndex].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        document.addEventListener('keydown', (e) => {
            if (currentConflicts.length === 0) return;
            const key = e.key;
            if (key === 'm' || key === 'M') {
                e.preventDefault();
                const conflict = currentConflicts[selectedIndex];
                if (conflict) {
                    setFinal(conflict.q, conflict.entryNum, 'correct');
                    advanceConflictSelection();
                }
            } else if (key === 'x' || key === 'X') {
                e.preventDefault();
                const conflict = currentConflicts[selectedIndex];
                if (conflict) {
                    setFinal(conflict.q, conflict.entryNum, 'wrong');
                    advanceConflictSelection();
                }
            } else if (key === 'ArrowRight') {
                e.preventDefault();
                selectConflictCard(selectedIndex + 1);
            } else if (key === 'ArrowLeft') {
                e.preventDefault();
                selectConflictCard(selectedIndex - 1);
            } else if (key === 'ArrowDown') {
                e.preventDefault();
                selectConflictCard(selectedIndex + getConflictGridCols());
            } else if (key === 'ArrowUp') {
                e.preventDefault();
                selectConflictCard(selectedIndex - getConflictGridCols());
            }
        });

        init();
        async function showPreview(entryNum) {
            let overlay = document.getElementById('preview-overlay');
            if (!overlay) { overlay = document.createElement('div'); overlay.id = 'preview-overlay'; overlay.className = 'preview-overlay'; document.body.appendChild(overlay); }
            let masterData = {}; try { masterData = JSON.parse(localStorage.getItem('masterData')||'{}'); } catch(e) {}
            const name = masterData[entryNum]?.name || `受付番号 ${entryNum}`;
            overlay.innerHTML = `<div class="preview-header"><h2>${name} の解答用紙</h2><button class="preview-close" onclick="document.getElementById('preview-overlay').classList.remove('show')">✕ 閉じる</button></div><div id="preview-content" style="text-align:center"><div style="color:#aaa">読み込み中...</div></div>`;
            overlay.classList.add('show');
            const snap = await db.ref(`projects/${projectId}/answers/${entryNum}/pageImage`).get();
            const pc = document.getElementById('preview-content');
            if (snap.exists()) {
                pc.innerHTML = `<img src="${snap.val()}" alt="${name}" style="max-width:100%;border-radius:8px;background:white;">`;
            } else { pc.innerHTML = '<div style="color:#aaa">ページ画像が保存されていません。管理画面から答案を再読み込みしてください。</div>'; }
        }
        }
        document.addEventListener('keydown', e => { if (e.key === 'Escape') document.getElementById('preview-overlay')?.classList.remove('show'); });
    </script>
</body>

</html>
