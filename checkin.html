<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src https://fonts.gstatic.com https://cdnjs.cloudflare.com; connect-src 'self' https://quziopus-default-rtdb.asia-southeast1.firebasedatabase.app https://firebasestorage.googleapis.com https://script.google.com; img-src 'self' data: blob: https://firebasestorage.googleapis.com;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="description" content="QuizOpus - クイズ大会の解答採点を支援するウェブプラットフォーム。リアルタイム採点・成績開示・参加者管理をワンストップで。">
    <meta property="og:title" content="QuizOpus - 解答採点プラットフォーム">
    <meta property="og:description" content="クイズ大会の解答採点を支援するウェブプラットフォーム">
    <meta property="og:type" content="website">
    <meta property="og:image" content="favicon.png">
    <title>QuizOpus - 当日受付</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    <script src="js/config.js"></script>
    <script src="js/crypto.js"></script>
    <script src="js/shared.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/design_system.css">
    <style>

        .main-content { margin-top: 70px; padding: 24px 40px; max-width: 1200px; margin-left: auto; margin-right: auto; display: grid; gap: 32px; grid-template-columns: 1fr; }
        @media(min-width: 900px) { .main-content { grid-template-columns: 1fr 1fr; } }

        #camera-container { position: relative; width: 100%; }
        #video {
            width: 100%; border-radius: var(--radius-lg);
            border: 2px solid var(--glass-border); background: #000;
            transform: scaleX(-1);
        }
        #canvas { display: none; }

        #scanning-text {
            margin-top: 12px; color: var(--text-muted); font-size: 14px;
            text-align: center; font-weight: 600;
        }

        #result {
            margin-top: 16px; width: 100%;
            padding: 20px; border-radius: var(--radius-lg);
            text-align: center; font-size: 18px; display: none;
            font-weight: 600;
        }
        #result.success { background: rgba(16,185,129,0.15); border: 2px solid rgba(16,185,129,0.5); color: #34d399; }
        #result.error { background: rgba(239,68,68,0.15); border: 2px solid rgba(239,68,68,0.5); color: #f87171; }
        #result.already { background: rgba(245,158,11,0.15); border: 2px solid rgba(245,158,11,0.5); color: #fbbf24; }
        #result.canceled { background: rgba(239,68,68,0.15); border: 2px solid rgba(239,68,68,0.5); color: #f87171; }
        #result.loading { background: rgba(59,130,246,0.15); border: 2px solid rgba(59,130,246,0.5); color: #60a5fa; }
        .name { font-size: 28px; font-weight: 800; margin: 10px 0; color: var(--text-main); }
        .number { font-size: 16px; color: var(--text-muted); }

        .stats-bar {
            margin-top: 24px; width: 100%;
        }
        .stats-bar h3 { font-size: 14px; color: var(--text-muted); margin-bottom: 12px; font-weight: 600; text-transform: uppercase; }
        .stats-row { display: flex; justify-content: space-around; gap: 16px; }
        .stat-item {
            text-align: center; flex: 1; padding: 16px;
        }
        .stat-item .stat-num { font-size: 28px; font-weight: 800; }
        .stat-item .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="fixed-header">
        <div class="header-left">
            <button class="back-nav-btn" onclick="location.href='judge.html'"><i class="fa-solid fa-chevron-left"></i> 戻る</button>
        </div>
        <div class="header-center">
            <h1 id="page-title"><i class="fa-solid fa-qrcode"></i> 当日受付</h1>
        </div>
        <div class="header-right"></div>
    </div>

    <div class="main-content">
        <div class="left-col">
            <div id="camera-container">
                <video id="video" autoplay playsinline></video>
                <canvas id="canvas"></canvas>
            </div>
            <p id="scanning-text"><i class="fa-solid fa-camera"></i> QRコードをカメラにかざしてください</p>
            <div id="result"></div>
        </div>

        <div class="right-col">
            <div class="stats-bar glass-panel" id="stats-bar" style="display:none;margin-top:0;">
                <h3><i class="fa-solid fa-chart-bar"></i> 受付状況</h3>
                <div class="stats-row" style="flex-wrap:wrap;">
                    <div class="stat-item glass-panel">
                        <div class="stat-num" id="stat-total" style="color: var(--primary)">-</div>
                        <div class="stat-label"><i class="fa-solid fa-users"></i> エントリー</div>
                    </div>
                    <div class="stat-item glass-panel">
                        <div class="stat-num" id="stat-checked" style="color: #34d399">-</div>
                        <div class="stat-label"><i class="fa-solid fa-check"></i> 受付済み</div>
                    </div>
                    <div class="stat-item glass-panel">
                        <div class="stat-num" id="stat-remaining" style="color: #fbbf24">-</div>
                        <div class="stat-label"><i class="fa-solid fa-clock"></i> 未受付</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/checkin.js"></script>
</body>
</html>
