<html lang="ja">

  <title>解答採点プラットフォーム - プロジェクト設定</title>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #1a1a2e; color: white; min-height: 100vh; padding: 20px; }
    .top-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    h1 { font-size: 20px; }
    .btn { padding: 8px 16px; border-radius: 8px; border: none; background: #4caf50; color: white; font-size: 14px; cursor: pointer; white-space: nowrap; }
    .btn:hover { background: #388e3c; }
    .btn.secondary { background: #0f3460; border: 1px solid #444; }
    .btn.secondary:hover { background: #1a4a7a; }
    .main { display: flex; gap: 20px; flex-wrap: wrap; }
    .card { background: #16213e; border-radius: 12px; padding: 24px; min-width: 400px; flex: 1; }
    label { font-size: 14px; color: #aaa; display: block; margin-bottom: 8px; margin-top: 16px; }
    input { width: 100%; padding: 12px 16px; border-radius: 8px; border: 1px solid #444; background: #0f3460; color: white; font-size: 16px; }
    .status { padding: 12px; border-radius: 8px; background: #1b5e20; color: white; font-size: 14px; text-align: center; margin-top: 16px; display: none; }
  </style>
</head>

  <div class="top-bar">
    <button class="btn secondary" onclick="location.href='judge.html'">← 採点画面へ</button>
    <h1>プロジェクト設定・解答用紙ジェネレーター</h1>
  </div>

  <div class="main">
    <div class="card">
      <h2 style="margin-bottom: 8px;" id="project-title">プロジェクト設定</h2>
      <p style="color: #aaa; font-size: 14px; margin-bottom: 24px;">スプレッドシート連携と用紙の自動生成を行います。</p>
      
      <label>GAS (Google Apps Script) 連携URL</label>
      <input type="text" id="gas-url" placeholder="https://script.google.com/macros/s/..." />
      <div style="font-size: 12px; color: #888; margin-top: 4px;">参加者名簿との同期やCSVバックアップに使用します。</div>

      <label>問題数 (デフォルト: 100)</label>
      <input type="number" id="question-count" value="100" min="10" max="200" />
      
      <label>段の列数 (デフォルト: 5)</label>
      <input type="number" id="question-cols" value="5" min="2" max="10" />
      <div style="font-size: 12px; color: #888; margin-top: 4px;">例：100問で5列の場合、20段の表が描画されます。</div>
      
      <button class="btn" style="width: 100%; margin-top: 32px; padding: 16px; font-weight: bold;" onclick="generateAndSave()">解答用紙PDFの発行 と システム設定保存</button>
      
      <div id="save-status" class="status">✅ PDFが生成され、座標データがシステムに保存されました！</div>
    </div>
  </div>

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const pid = sessionStorage.getItem('projectId');
    if (!pid || sessionStorage.getItem('scorer_role') !== 'admin') {
      alert('管理者としてプロジェクトに入室してください');
      location.href = 'index.html';
    }

    document.getElementById('project-title').textContent = `プロジェクトID: ${pid} の設定`;

    // 既存設定の読み込み
    db.ref(`projects/${pid}/settings`).once('value', snap => {
      if (snap.exists() && snap.val().gasUrl) {
        document.getElementById('gas-url').value = snap.val().gasUrl;
      }
    });

    async function generateAndSave() {
      const qCount = parseInt(document.getElementById('question-count').value);
      const qCols = parseInt(document.getElementById('question-cols').value);
      const gasUrl = document.getElementById('gas-url').value.trim();

      if (qCount < 1 || qCols < 1) {
        alert("正しい数値を入力してください");
        return;
      }

      // PDFジェネレータの初期化 (A4, mm単位)
      window.jsPDF = window.jspdf.jsPDF;
      const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
      const pageWidth = 210;
      const pageHeight = 297;

      // 共通マージンと座標空間の定義 (1mm = 1次元単位としてシステムに保存)
      const config = {
        questionCount: qCount,
        columns: qCols,
        scale: 1, // ミリメートル空間のスケール（読取時にどう拡大縮小されても射影変換で吸収できる）
        tombo: [],
        markCells: [],
        answerRegions: []
      };

      // 1. ARマーカー (10mm x 10mm), 各角から5mm
      const markerSize = 10;
      const margin = 5;
      const tomboCoords = [
        { x: margin, y: margin, id: 0 },
        { x: pageWidth - margin - markerSize, y: margin, id: 1 },
        { x: margin, y: pageHeight - margin - markerSize, id: 2 },
        { x: pageWidth - margin - markerSize, y: pageHeight - margin - markerSize, id: 3 }
      ];

      tomboCoords.forEach((p, index) => {
        doc.addImage(marker_b64[p.id], 'PNG', p.x, p.y, markerSize, markerSize);
        config.tombo.push({ x: p.x, y: p.y, w: markerSize, h: markerSize });
      });

      // フォント設定
      doc.setFontSize(8);
      doc.setTextColor(50);

      // 2. 解答欄 (Questions Grid)
      // プレイアブルエリア：横方向はマーカー間+α、縦方向は上のマーカー下から下のマーカー上までの間
      const gridMarginX = 15;
      const gridMarginTop = 20;
      const gridSpaceWidth = pageWidth - gridMarginX * 2;
      const colWidth = gridSpaceWidth / qCols;
      
      const rows = Math.ceil(qCount / qCols);
      // グリッドの高さを確保 (全高297 - 上20 - 下(マークシート分)35 = 242)
      const maxGridHeight = 242;
      const rowHeight = maxGridHeight / rows;

      doc.setLineWidth(0.2);
      
      for (let i = 0; i < qCount; i++) {
        const col = Math.floor(i / rows);
        const row = i % rows;
        const x = gridMarginX + col * colWidth;
        const y = gridMarginTop + row * rowHeight;

        // 問題番号の枠線と印字
        doc.rect(x, y, colWidth, rowHeight, 'S');
        doc.text((i + 1).toString(), x + 2, y + 4);

        // システムが読み取る解答枠 (x + 8 から右端まで)
        const ansX = x + 8;
        const ansW = colWidth - 8;
        config.answerRegions.push({ x: ansX, y, w: ansW, h: rowHeight });

        // もし見た目上の枠線も引きたい場合はここに記述(今回は不要)
      }

      // 3. 受付番号マークシート (Bottom Left)
      const bottomY = gridMarginTop + maxGridHeight + 5; // y = 267
      doc.setFontSize(10);
      doc.text("受付番号", 15, bottomY + 4);

      const markSheetX = 35;
      const markSheetY = bottomY;
      const bubbleW = 6;
      const bubbleH = 5;
      
      doc.setFontSize(7);
      for (let row = 0; row < 3; row++) {
        for (let col = 0; col < 10; col++) {
          const cx = markSheetX + col * (bubbleW + 1);
          const cy = markSheetY + row * (bubbleH + 2);
          
          doc.ellipse(cx + bubbleW/2, cy + bubbleH/2, bubbleW/2, bubbleH/2, 'S');
          doc.text(col.toString(), cx + bubbleW/2 - 1, cy + bubbleH/2 + 1);
          
          // config に保存
          config.markCells.push({ x: cx, y: cy, w: bubbleW, h: bubbleH });
        }
      }

      // 4. 名前・所属枠 (Bottom Right)
      const nameBoxX = 110;
      const nameBoxY = bottomY;
      doc.rect(nameBoxX, nameBoxY, 85, 18, 'S');
      doc.line(nameBoxX + 20, nameBoxY, nameBoxX + 20, nameBoxY + 18, 'S');
      doc.setFontSize(10);
      doc.text("氏名・所属", nameBoxX + 2, nameBoxY + 10);

      // PDFのダウンロード
      doc.save(`answer_sheet_${qCount}q.pdf`);

      // Firebaseへの保存
      await db.ref(`projects/${pid}/settings/gasUrl`).set(gasUrl);
      await db.ref(`projects/${pid}/config`).set(config);

      document.getElementById('save-status').style.display = 'block';
      setTimeout(() => document.getElementById('save-status').style.display = 'none', 5000);
    }
