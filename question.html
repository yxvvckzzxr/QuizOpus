<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIQ the 13th 採点システム - 採点</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="js/config.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: sans-serif;
            background: #1a1a2e;
            color: white;
            min-height: 100vh;
            padding-top: 80px;
            padding-left: 20px;
            padding-right: 20px;
            padding-bottom: 20px;
        }

        .fixed-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #0f3460;
            border-bottom: 2px solid #2196f3;
            padding: 12px 20px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            background: #4caf50;
            color: white;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
        }

        .btn:hover {
            background: #388e3c;
        }

        .btn:disabled {
            background: #444;
            cursor: not-allowed;
        }

        .btn.secondary {
            background: #1a4a7a;
            border: 1px solid #2196f3;
        }

        .btn.secondary:hover {
            background: #1565c0;
        }

        .btn.complete {
            background: #1565c0;
            font-size: 15px;
            padding: 10px 24px;
            margin-left: auto;
        }

        .btn.complete:hover {
            background: #0d47a1;
        }

        .btn.complete.done {
            background: #388e3c;
        }

        .q-badge {
            background: #1a237e;
            padding: 6px 16px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
        }

        .answer-badge {
            background: #1b5e20;
            padding: 6px 16px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            color: #a5d6a7;
            max-width: 400px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .progress-text {
            font-size: 13px;
            color: #aaa;
        }

        .answer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
        }

        .answer-card {
            background: #16213e;
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            border: 2px solid #444;
            transition: border-color 0.2s, box-shadow 0.2s;
            cursor: pointer;
            content-visibility: auto;
            contain-intrinsic-size: 160px 120px;
        }

        .answer-card.correct {
            border-color: #4caf50;
            background: #1b3a1f;
        }

        .answer-card.wrong {
            border-color: #ef5350;
            background: #3a1b1b;
        }

        .answer-card.hold {
            border-color: #ff9800;
            background: #3a2b1b;
        }

        .answer-card img {
            width: 100%;
            height: 70px;
            object-fit: contain;
            border-radius: 4px;
            background: white;
            margin-bottom: 8px;
        }

        .entry-num {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 8px;
        }

        .answer-card.selected {
            box-shadow: 0 0 0 3px #2196f3, 0 0 12px rgba(33, 150, 243, 0.3);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #aaa;
        }

        .shortcut-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #0f3460;
            border-top: 1px solid #444;
            padding: 8px 20px;
            display: flex;
            gap: 20px;
            justify-content: center;
            font-size: 12px;
            color: #90caf9;
            z-index: 100;
        }
        .shortcut-bar kbd {
            background: #1a237e;
            padding: 2px 8px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 13px;
            margin-right: 4px;
        }
        .preview-overlay { position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:1000;display:none;overflow-y:auto;padding:20px; }
        .preview-overlay.show { display:block; }
        .preview-header { display:flex;align-items:center;justify-content:space-between;margin-bottom:16px; }
        .preview-header h2 { font-size:18px; }
        .preview-close { background:#c62828;border:none;color:white;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:14px; }
        .preview-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px; }
        .preview-grid .pv-item { background:#16213e;border-radius:8px;padding:8px;text-align:center; }
        .preview-grid .pv-item img { width:100%;background:white;border-radius:4px; }
        .preview-grid .pv-item .pv-label { font-size:12px;color:#aaa;margin-top:4px; }
    </style>
</head>

<body>
    <div class="fixed-header">
        <button class="btn secondary" onclick="location.href='judge.html'">← 一覧へ</button>
        <div class="q-badge" id="q-badge">- 問</div>
        <div class="answer-badge" id="answer-badge">...</div>
        <div class="progress-text" id="progress-text"></div>
    </div>

    <div class="answer-grid" id="answer-grid">
        <div class="loading">読み込み中...</div>
    </div>

    <div class="shortcut-bar">
        <span><kbd>M</kbd> 正解</span>
        <span><kbd>X</kbd> 不正解</span>
        <span><kbd>H</kbd> 保留</span>
        <span><kbd>←→↑↓</kbd> 移動</span>
    </div>

    <script>
const projectId = session.projectId;
        const scorerName = session.scorerName;
        const currentQ = parseInt(localStorage.getItem('current_q') || '1');

        if (!projectId || !scorerName) location.href = 'index.html';

        document.getElementById('q-badge').textContent = `${currentQ} 問`;

        let answers = {};
        let myScores = {};
        let entryNumbers = [];
        let isCompleted = false;
        let selectedIndex = 0;

        async function init() {
            // 模範解答読み込み
            const answerSnap = await db.ref(`projects/${projectId}/answers_text/${currentQ}`).get();
            const answerText = answerSnap.exists() ? answerSnap.val() : '未設定';
            document.getElementById('answer-badge').textContent = answerText;

            // 答案データのキー(受付番号)のみ取得
            try {
                const res = await fetch(`https://ciq-saiten-default-rtdb.asia-southeast1.firebasedatabase.app/projects/${projectId}/answers.json?shallow=true`);
                const data = await res.json();
                if (data) entryNumbers = Object.keys(data).map(Number).sort((a, b) => a - b);
            } catch(e) {
                const answersSnap = await db.ref(`projects/${projectId}/answers`).get();
                if (answersSnap.exists()) entryNumbers = Object.keys(answersSnap.val()).map(Number).sort((a, b) => a - b);
            }

            if (entryNumbers.length === 0) {
                document.getElementById('answer-grid').innerHTML = '<div class="loading">答案データがありません</div>';
                return;
            }

            // 現在の設問の画像のみを並列取得 (100倍高速化)
            const fetchPromises = entryNumbers.map(async (entryNum) => {
                const imgSnap = await db.ref(`projects/${projectId}/answers/${entryNum}/cells/q${currentQ}`).get();
                if (!answers[entryNum]) answers[entryNum] = { cells: {} };
                answers[entryNum].cells[`q${currentQ}`] = imgSnap.val();
            });
            await Promise.all(fetchPromises);

            // 採点者として登録
            await db.ref(`projects/${projectId}/scores/__scorers__q${currentQ}/${scorerName}`).set(true);

            // スコアのリアルタイム監視
            db.ref(`projects/${projectId}/scores`).on('value', snap => {
                const allScores = snap.val() || {};
                myScores = {};
                entryNumbers.forEach(entryNum => {
                    myScores[entryNum] = allScores[entryNum]?.[`q${currentQ}`]?.[scorerName] || null;
                });
                isCompleted = allScores[`__completed__q${currentQ}`]?.[scorerName] === true;
                renderGrid();
                checkAutoCompletion();
            });
        }

        function renderGrid() {
            const grid = document.getElementById('answer-grid');
            if (selectedIndex >= entryNumbers.length) selectedIndex = Math.max(0, entryNumbers.length - 1);

            const total = entryNumbers.length;
            const done = entryNumbers.filter(n => myScores[n] !== null).length;
            document.getElementById('progress-text').textContent = `${done} / ${total} 件`;

            let masterData = {};
            try { masterData = JSON.parse(localStorage.getItem('masterData') || '{}'); } catch(e) {}

            // DOMを毎度作り直すと画像がチラつくため、既に要素があればクラスのみ更新
            if (grid.children.length === entryNumbers.length && grid.children[0].className.includes('answer-card')) {
                entryNumbers.forEach((entryNum, idx) => {
                    const myScore = myScores[entryNum];
                    const card = grid.children[idx];
                    card.className = `answer-card ${myScore === 'correct' ? 'correct' : myScore === 'wrong' ? 'wrong' : myScore === 'hold' ? 'hold' : ''} ${idx === selectedIndex ? 'selected' : ''}`;
                });
            } else {
                grid.innerHTML = '';
                entryNumbers.forEach((entryNum, idx) => {
                    const imageData = answers[entryNum]?.cells[`q${currentQ}`];
                    const myScore = myScores[entryNum];
                    const displayName = masterData[entryNum]?.name || `受付番号 ${entryNum}`;

                    const card = document.createElement('div');
                    card.className = `answer-card ${myScore === 'correct' ? 'correct' : myScore === 'wrong' ? 'wrong' : myScore === 'hold' ? 'hold' : ''} ${idx === selectedIndex ? 'selected' : ''}`;
                    card.innerHTML = `
              <img src="${imageData || ''}" alt="${displayName}" loading="lazy" />
              <div class="entry-num">${displayName}</div>
            `;
                    card.addEventListener('click', () => selectCard(idx));
                    card.addEventListener('dblclick', () => showPreview(entryNum));
                    grid.appendChild(card);
                });
            }

            scrollToSelected();
        }

        function mark(entryNum, result) {
            db.ref(`projects/${projectId}/scores/${entryNum}/q${currentQ}/${scorerName}`).set(result);
        }

        function selectCard(idx) {
            if (idx < 0 || idx >= entryNumbers.length) return;
            selectedIndex = idx;
            const cards = document.querySelectorAll('.answer-card');
            cards.forEach((card, i) => card.classList.toggle('selected', i === selectedIndex));
            scrollToSelected();
        }

        function advanceSelection() {
            if (selectedIndex < entryNumbers.length - 1) {
                selectCard(selectedIndex + 1);
            }
        }

        function getGridCols() {
            const grid = document.getElementById('answer-grid');
            return getComputedStyle(grid).gridTemplateColumns.split(' ').length;
        }

        function scrollToSelected() {
            const cards = document.querySelectorAll('.answer-card');
            if (cards[selectedIndex]) {
                cards[selectedIndex].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        document.addEventListener('keydown', (e) => {
            if (entryNumbers.length === 0) return;
            const key = e.key;
            if (key === 'm' || key === 'M') {
                e.preventDefault();
                const entryNum = entryNumbers[selectedIndex];
                if (entryNum !== undefined) {
                    mark(entryNum, 'correct');
                    advanceSelection();
                }
            } else if (key === 'x' || key === 'X') {
                e.preventDefault();
                const entryNum = entryNumbers[selectedIndex];
                if (entryNum !== undefined) {
                    mark(entryNum, 'wrong');
                    advanceSelection();
                }
            } else if (key === 'h' || key === 'H') {
                e.preventDefault();
                const entryNum = entryNumbers[selectedIndex];
                if (entryNum !== undefined) {
                    mark(entryNum, 'hold');
                    advanceSelection();
                }
            } else if (key === 'ArrowRight') {
                e.preventDefault();
                selectCard(selectedIndex + 1);
            } else if (key === 'ArrowLeft') {
                e.preventDefault();
                selectCard(selectedIndex - 1);
            } else if (key === 'ArrowDown') {
                e.preventDefault();
                selectCard(selectedIndex + getGridCols());
            } else if (key === 'ArrowUp') {
                e.preventDefault();
                selectCard(selectedIndex - getGridCols());
            }
        });

        async function checkAutoCompletion() {
            const total = entryNumbers.length;
            const done = entryNumbers.filter(n => myScores[n] !== null).length;
            const allDone = done === total && total > 0;

            document.getElementById('progress-text').textContent = `${done} / ${total} 件`;

            if (allDone && !isCompleted) {
                isCompleted = true; // 重複実行ブロック
                await db.ref(`projects/${projectId}/scores/__completed__q${currentQ}/${scorerName}`).set(true);

                const snap = await db.ref(`projects/${projectId}/scores`).get();
                await checkAutoConfirm(snap.val() || {}, currentQ);
                
                location.href = 'judge.html';
            }
        }

        async function checkAutoConfirm(allScores, q) {
            const completedScorers = Object.keys(allScores[`__completed__q${q}`] || {});
            if (completedScorers.length < 3) return;

            const entryNums = Object.keys(allScores)
                .filter(k => !k.startsWith('__'))
                .map(Number);

            const finals = {};
            let allAgree = true;

            for (const entryNum of entryNums) {
                const qScores = allScores[entryNum]?.[`q${q}`] || {};
                const vals = Object.values(qScores);
                const corrects = vals.filter(v => v === 'correct').length;
                const wrongs = vals.filter(v => v === 'wrong').length;
                const holds = vals.filter(v => v === 'hold').length;

                if ((corrects > 0 && wrongs > 0) || holds > 0) {
                    allAgree = false;
                    break;
                }
                finals[entryNum] = corrects >= wrongs ? 'correct' : 'wrong';
            }

            if (allAgree) {
                await db.ref(`projects/${projectId}/scores/__final__q${q}`).set(finals);
            }
        }

        init();
        async function showPreview(entryNum) {
            let overlay = document.getElementById('preview-overlay');
            if (!overlay) {
                overlay = document.createElement('div');
                overlay.id = 'preview-overlay'; overlay.className = 'preview-overlay';
                document.body.appendChild(overlay);
            }
            let masterData = {}; try { masterData = JSON.parse(localStorage.getItem('masterData')||'{}'); } catch(e) {}
            const name = masterData[entryNum]?.name || `受付番号 ${entryNum}`;
            overlay.innerHTML = `<div class="preview-header"><h2>${name} の解答用紙</h2><button class="preview-close" onclick="document.getElementById('preview-overlay').classList.remove('show')">✕ 閉じる</button></div><div id="preview-content" style="text-align:center"><div style="color:#aaa">読み込み中...</div></div>`;
            overlay.classList.add('show');
            const snap = await db.ref(`projects/${projectId}/answers/${entryNum}/pageImage`).get();
            const pc = document.getElementById('preview-content');
            if (snap.exists()) {
                pc.innerHTML = `<img src="${snap.val()}" alt="${name}" style="max-width:100%;border-radius:8px;background:white;">`;
            } else { pc.innerHTML = '<div style="color:#aaa">ページ画像が保存されていません。管理画面から答案を再読み込みしてください。</div>'; }
        }
        document.addEventListener('keydown', e => { if (e.key === 'Escape') document.getElementById('preview-overlay')?.classList.remove('show'); });
    </script>
</body>

</html>
